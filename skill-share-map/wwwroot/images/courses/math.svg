<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="mathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#mathGrad)"/>
  <g transform="translate(400, 300)">
    <text x="0" y="-60" font-family="Arial, sans-serif" font-size="120" fill="white" text-anchor="middle" font-weight="bold">π</text>
    <text x="-100" y="30" font-family="Arial, sans-serif" font-size="48" fill="rgba(255,255,255,0.8)" text-anchor="middle">∑</text>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="48" fill="rgba(255,255,255,0.8)" text-anchor="middle">∫</text>
    <text x="-120" y="-100" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.7)" text-anchor="middle">√</text>
    <text x="120" y="-100" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.7)" text-anchor="middle">∞</text>
    <path d="M -60 60 L 60 60" stroke="white" stroke-width="3" opacity="0.6"/>
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">Advanced Mathematics</text>
  </g>
</svg>