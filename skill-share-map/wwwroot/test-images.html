<!DOCTYPE html>
<html>
<head>
    <title>Image Test</title>
</head>
<body>
    <h1>Course Images Test</h1>
    <h2>Using img tag:</h2>
    <img src="/images/courses/web-dev.svg" alt="Web Dev" style="width: 200px; height: 200px;">
    <img src="/images/courses/math.svg" alt="Math" style="width: 200px; height: 200px;">
    
    <h2>Using background-image:</h2>
    <div style="width: 200px; height: 200px; background-image: url('/images/courses/photography.svg'); background-size: cover;"></div>
</body>
</html>
